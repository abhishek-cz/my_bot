# AMCL + map_server parameters for my_bot localization
# Used by launch/localization.launch.py

map_server:
  ros__parameters:
    use_sim_time: true
    # yaml_filename is set from the launch file so the absolute install-share
    # path is resolved at runtime; leaving it empty here is intentional.
    yaml_filename: ""
    topic: "map"
    frame_id: "map"

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

amcl:
  ros__parameters:
    use_sim_time: true

    # Seed the initial pose so AMCL localizes immediately on startup
    # instead of waiting forever for a /initialpose publication.
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Frames — match the existing robot's TF tree (do not change).
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    scan_topic: "scan"

    # Motion model — differential drive AMR.
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Particle filter
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    resample_interval: 1
    update_min_a: 0.2
    update_min_d: 0.25
    transform_tolerance: 1.0
    save_pose_rate: 0.5

    # Laser model
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 60
    sigma_hit: 0.2
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    tf_broadcast: true
    always_reset_initial_pose: false
    first_map_only: false

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 4.0
    node_names:
      - map_server
      - amcl
